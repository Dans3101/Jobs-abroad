<!DOCTYPE html>
<html>
<head>
  <title>Danscom App</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      padding-top:100px;
      background:#f5f5f5;
    }

    #popup{
      display:none;
      position:fixed;
      bottom:20px;
      right:20px;
      width:300px;
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.3);
    }

    button{
      background:green;
      color:white;
      border:none;
      padding:12px;
      border-radius:8px;
      cursor:pointer;
      width:100%;
    }

    .close{
      float:right;
      cursor:pointer;
      color:red;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>Welcome to Danscom</h1>

<p>Best experience on our mobile app.</p>

<div id="popup">

<span class="close" onclick="closePopup()">X</span>

<h3>Download Our App</h3>

<p>Install the Danscom App now.</p>

<button onclick="downloadApp()">
Download App
</button>

</div>

<script>

setTimeout(() => {
  document.getElementById("popup").style.display = "block";
}, 3000);

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function downloadApp(){

  // Replace with your APK or Play Store link
  window.location.href =
  "https://your-app-link.com";

}

</script>

</body>
</html>
