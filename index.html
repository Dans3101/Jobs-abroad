<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    #appPopup {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      z-index: 9999;
      font-family: Arial;
    }

    #appPopup button {
      background: green;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    #closeBtn {
      float: right;
      cursor: pointer;
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Welcome to My Website</h1>

<div id="appPopup">
  <span id="closeBtn">X</span>

  <h3>Download Our App</h3>

  <p>Get a better experience using our mobile app.</p>

  <button onclick="downloadApp()">
    Download App
  </button>
</div>

<script>
  // Show popup after 3 seconds
  setTimeout(() => {
    document.getElementById("appPopup").style.display = "block";
  }, 3000);

  // Close popup
  document.getElementById("closeBtn").onclick = function() {
    document.getElementById("appPopup").style.display = "none";
  }

  // Download button action
  function downloadApp() {
    window.location.href =
    "https://play.google.com/store/apps/details?id=com.example.app";
  }
</script>

</body>
</html>
